<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>FitTrack · Vinícius</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#0f172a;font-size:14px;background:#f1f5f9}
#app{max-width:480px;margin:0 auto;min-height:100vh;background:#fff;position:relative;padding-bottom:70px;box-shadow:0 0 40px rgba(0,0,0,.07)}
:root{
  --g:#0F6E56;--gBg:#E1F5EE;--gAcc:#1D9E75;
  --b:#185FA5;--bBg:#E6F1FB;
  --a:#854F0B;--aBg:#FAEEDA;--aAcc:#BA7517;
  --p:#534AB7;--pBg:#EEEDFE;--pAcc:#7F77DD;
  --r:#993556;--rBg:#FBEAF0;
  --bd:#E2E8F0;--bg2:#F8FAFC;--ts:#64748B
}
.hdr{padding:16px 16px 12px;border-bottom:1px solid var(--bd);background:#fff;position:sticky;top:0;z-index:10}
.hdr h1{font-size:18px;font-weight:700}
.hdr p{font-size:12px;color:var(--ts);margin-top:2px}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid var(--bd);display:flex;z-index:99}
.nb{flex:1;padding:9px 2px 7px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px;font-weight:600;color:var(--ts);letter-spacing:.2px;transition:color .15s}
.nb.on{color:var(--g)}
.nb svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7}
.pnl{display:none;padding:14px}
.pnl.on{display:block}
.card{border:1px solid var(--bd);border-radius:12px;padding:13px 14px;margin-bottom:10px}
.st{font-size:10px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:10px}
.seg{display:flex;border:1px solid var(--bd);border-radius:9px;overflow:hidden;margin-bottom:12px}
.seg button{flex:1;padding:7px 4px;font-size:11px;font-weight:500;text-align:center;cursor:pointer;border:none;background:#fff;color:var(--ts)}
.seg button:not(:last-child){border-right:1px solid var(--bd)}
.seg button.on{background:var(--gBg);color:var(--g);font-weight:700}
.pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
.pills::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:5px 13px;font-size:12px;font-weight:500;border-radius:20px;cursor:pointer;border:1px solid var(--bd);background:#fff;color:var(--ts);white-space:nowrap}
.pill.on{background:var(--gBg);color:var(--g);border-color:var(--gAcc);font-weight:700}
.pill.onb{background:var(--bBg);color:var(--b);border-color:var(--b);font-weight:700}
.pill.onp{background:var(--pBg);color:var(--p);border-color:var(--p);font-weight:700}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.kpi{border-radius:10px;padding:10px 10px}
.kpi-v{font-size:20px;font-weight:800}
.kpi-l{font-size:10px;color:var(--ts);margin-top:2px}
.wk-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.wk-lbl{font-size:9px;color:var(--ts);text-align:center;margin-bottom:5px}
.wk-cell{aspect-ratio:1;border-radius:7px;display:flex;align-items:center;justify-content:center}
.wk-cell.done{background:var(--gAcc)}
.wk-cell.empty{background:var(--bg2)}
.ph-bar-wrap{height:7px;background:var(--bg2);border-radius:4px}
.ph-bar{height:100%;border-radius:4px;transition:width .5s}
.ex-row{display:grid;grid-template-columns:34px 1fr auto;gap:0 10px;padding:11px 0;border-bottom:1px solid var(--bd);align-items:start}
.ex-row:last-child{border-bottom:none}
.chk{width:26px;height:26px;border-radius:7px;cursor:pointer;border:1.5px solid #CBD5E1;display:flex;align-items:center;justify-content:center;transition:all .2s;background:#fff;user-select:none}
.chk.ck{border:none}
.ex-name{font-size:13px;font-weight:600;line-height:1.3}
.ex-name.ck{text-decoration:line-through;opacity:.35}
.ex-sets{font-size:12px;font-weight:600;margin-top:3px}
.ex-tip{font-size:11px;color:var(--ts);margin-top:3px;line-height:1.4}
.ex-fields{display:flex;flex-direction:column;gap:5px;align-items:flex-end}
.fl{display:flex;flex-direction:column;align-items:center;gap:2px}
.fl span{font-size:9px;font-weight:600;color:var(--ts);text-transform:uppercase;letter-spacing:.4px}
.fl input{font-size:12px;padding:4px 5px;border-radius:7px;border:1px solid var(--bd);background:var(--bg2);color:#0f172a;width:74px;text-align:center}
.pbar-wrap{height:5px;background:var(--bg2);border-radius:3px;margin:8px 0 14px}
.pbar{height:100%;border-radius:3px;transition:width .3s}
.ok-msg{border-radius:10px;padding:11px;font-size:13px;font-weight:600;text-align:center;margin-top:8px}
.mc{border:1px solid var(--bd);border-radius:12px;padding:11px 13px;margin-bottom:8px}
.mc-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px}
.mc-name{display:flex;align-items:baseline;gap:5px;min-width:0;flex:1;overflow:hidden}
.mc-name b{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-name span{font-size:12px;color:var(--ts);white-space:nowrap;flex-shrink:0}
.mc-name i{color:#CBD5E1;flex-shrink:0;font-style:normal}
.ob{display:flex;gap:4px;flex-shrink:0}
.ob button{font-size:12px;font-weight:700;padding:3px 12px;border-radius:20px;cursor:pointer;border:1px solid var(--bd);background:var(--bg2);color:var(--ts)}
.ob button.on{background:var(--bBg);color:var(--b);border-color:var(--b)}
.mi{list-style:none;margin-bottom:8px}
.mi li{font-size:12px;padding:2px 0;display:flex;gap:6px;line-height:1.4}
.mi li::before{content:"·";color:var(--b);flex-shrink:0}
.mmac{display:flex;gap:10px;font-size:11px;flex-wrap:wrap;padding-top:7px;border-top:1px solid var(--bd)}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;margin-bottom:7px}
.tb-total{background:var(--bg2);border-radius:10px;padding:11px 13px;margin-top:6px}
.tb-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;text-align:center}
.tb-v{font-size:17px;font-weight:700}
.tb-l{font-size:10px;color:var(--ts);margin-top:1px}
.sub-nav{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:3px;scrollbar-width:none}
.sub-nav::-webkit-scrollbar{display:none}
.spill{flex-shrink:0;padding:6px 14px;font-size:12px;font-weight:500;border-radius:20px;border:1px solid var(--bd);cursor:pointer;background:#fff;color:var(--ts)}
.spill.on{background:var(--pBg);color:var(--p);border-color:var(--p);font-weight:700}
.hm{display:flex;gap:4px}
.hm-days{display:flex;flex-direction:column;gap:3px;padding-top:20px}
.hm-days span{font-size:9px;color:var(--ts);height:16px;display:flex;align-items:center}
.hm-col{flex:1;display:flex;flex-direction:column;gap:3px}
.hm-wl{font-size:8px;color:var(--ts);text-align:center;margin-bottom:2px}
.hm-cell{height:16px;border-radius:3px}
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sum-card{border-radius:10px;padding:10px 12px}
.sum-v{font-size:20px;font-weight:800}
.sum-l{font-size:11px;font-weight:600;margin-top:2px}
.sum-s{font-size:10px;color:var(--ts);margin-top:1px}
.cal-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.cal-hdr span{text-align:center;font-size:9px;font-weight:700;color:var(--ts);padding:3px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day{aspect-ratio:1;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px}
.cal-day.done{background:var(--gAcc);color:#fff;font-weight:700}
.cal-day.rest{background:#F1F5F9;color:var(--ts)}
.cal-day.future{color:#CBD5E1}
.msel{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.msel button{padding:5px 12px;font-size:12px;font-weight:500;border-radius:20px;border:1px solid transparent;cursor:pointer;background:transparent}
.cmp-row{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--bd)}
.cmp-row:last-child{border-bottom:none}
.mb-row{margin-bottom:10px}
.mb-bar{height:8px;background:var(--bg2);border-radius:4px;margin-top:4px}
.mb-fill{height:100%;border-radius:4px;background:var(--gAcc)}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.mf label{font-size:11px;color:var(--ts);display:block;margin-bottom:3px}
.mf input{font-size:14px;padding:8px 10px;border-radius:8px;border:1px solid var(--bd);background:var(--bg2);color:#0f172a;width:100%}
.sv-btn{width:100%;padding:11px;font-size:13px;font-weight:600;border-radius:8px;cursor:pointer;background:var(--gBg);color:var(--g);border:1px solid var(--gAcc)}
.hc{background:var(--bg2);border-radius:10px;padding:10px 13px;margin-bottom:8px}
.hc-hdr{font-size:11px;font-weight:600;color:var(--ts);margin-bottom:7px;display:flex;justify-content:space-between;align-items:center}
.hc-vals{display:flex;flex-wrap:wrap;gap:14px}
.hc-v{font-size:15px;font-weight:700}
.hc-l{font-size:10px;color:var(--ts)}
.tl-item{display:flex;gap:12px;margin-bottom:4px}
.tl-dot-wrap{display:flex;flex-direction:column;align-items:center}
.tl-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tl-line{width:2px;flex:1;min-height:16px;background:var(--bd);margin:4px 0}
.tl-note{font-size:12px;color:var(--ts);background:var(--bg2);border-radius:7px;padding:6px 9px;margin-top:6px;line-height:1.5}
.banner{border-radius:10px;padding:11px 13px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.export-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;font-size:12px;font-weight:600;border-radius:8px;cursor:pointer;border:1px solid var(--bd);background:#fff;color:var(--ts);width:100%;margin-bottom:10px}
.tip-box{background:var(--gBg);border:1px solid var(--gAcc);border-radius:10px;padding:11px 13px;margin-bottom:10px}
.empty-state{text-align:center;padding:2rem 1rem;color:var(--ts)}
.empty-state svg{width:36px;height:36px;margin-bottom:8px;stroke:currentColor;fill:none;stroke-width:1.4}
canvas{display:block}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <h1 id="hdr-title">Olá, Vinícius 👋</h1>
    <p id="hdr-sub">Fase 1 · Meses 1–2 · Início da transformação</p>
  </div>

  <!-- DASHBOARD -->
  <div class="pnl on" id="pnl-dashboard">
    <div class="kpi-grid" id="kpi-grid"></div>
    <div class="card" id="week-view"></div>
    <div class="card" id="phase-progress"></div>
    <div id="next-workout"></div>
    <div class="card">
      <span class="st">Tendência de peso</span>
      <div id="dash-weight-info" style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px"></div>
      <canvas id="chart-dash-weight" height="90"></canvas>
    </div>
  </div>

  <!-- TREINO -->
  <div class="pnl" id="pnl-treino">
    <div class="seg" id="phase-seg"></div>
    <div class="banner" id="phase-banner"></div>
    <div class="pills" id="day-pills"></div>
    <div class="card" id="workout-card"></div>
    <div id="workout-ok"></div>
  </div>

  <!-- NUTRIÇÃO -->
  <div class="pnl" id="pnl-nutricao">
    <span class="st">Semana</span>
    <div class="seg" id="week-seg"></div>
    <div class="pills" id="mday-pills"></div>
    <div id="meal-list"></div>
    <div class="tb-total" id="meal-total"></div>
  </div>

  <!-- RELATÓRIOS -->
  <div class="pnl" id="pnl-relatorios">
    <div class="sub-nav" id="report-subnav"></div>
    <div id="report-content"></div>
  </div>

  <!-- CORPO -->
  <div class="pnl" id="pnl-corpo">
    <div class="card">
      <span class="st">Registrar métricas hoje</span>
      <div class="mg">
        <div style="grid-column:span 2" class="mf"><label>Peso (kg)</label><input id="inp-peso" type="number" step="0.1" placeholder="78.5"></div>
        <div class="mf"><label>Cintura (cm)</label><input id="inp-cintura" type="number" placeholder="85"></div>
        <div class="mf"><label>Peito (cm)</label><input id="inp-peito" type="number" placeholder="100"></div>
        <div class="mf"><label>Braço (cm)</label><input id="inp-braco" type="number" placeholder="35"></div>
        <div class="mf"><label>Coxa (cm)</label><input id="inp-coxa" type="number" placeholder="55"></div>
      </div>
      <button class="sv-btn" onclick="saveMetric()">+ Salvar registro</button>
    </div>
    <div id="metric-history"></div>
  </div>

  <!-- TIMELINE -->
  <div class="pnl" id="pnl-timeline">
    <div style="display:flex;gap:6px;margin-bottom:14px;align-items:center">
      <div class="pills" id="tl-filter-pills" style="margin-bottom:0;flex:1"></div>
      <span style="font-size:11px;color:var(--ts);flex-shrink:0" id="tl-count"></span>
    </div>
    <div id="timeline-list"></div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="nav">
    <button class="nb on" id="nav-dashboard" onclick="go('dashboard')">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      Início
    </button>
    <button class="nb" id="nav-treino" onclick="go('treino')">
      <svg viewBox="0 0 24 24"><path d="M6 4v16M18 4v16M6 12h12M2 7h4M18 7h4M2 17h4M18 17h4"/></svg>
      Treino
    </button>
    <button class="nb" id="nav-nutricao" onclick="go('nutricao')">
      <svg viewBox="0 0 24 24"><path d="M12 2C9 2 6 4.5 6 8c0 2.5 1.5 4.5 3 5.5L8 20h8l-1.5-6.5C17 12.5 18 10.5 18 8c0-3-3-6-6-6z"/></svg>
      Nutrição
    </button>
    <button class="nb" id="nav-relatorios" onclick="go('relatorios')">
      <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Relatórios
    </button>
    <button class="nb" id="nav-corpo" onclick="go('corpo')">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Corpo
    </button>
    <button class="nb" id="nav-timeline" onclick="go('timeline')">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1.5"/><circle cx="3" cy="12" r="1.5"/><circle cx="3" cy="18" r="1.5"/></svg>
      Timeline
    </button>
  </nav>
</div>

<script>
// ─── CORES ──────────────────────────────────────────────────────────────────
const C={g:'#0F6E56',gBg:'#E1F5EE',gAcc:'#1D9E75',b:'#185FA5',bBg:'#E6F1FB',a:'#854F0B',aBg:'#FAEEDA',aAcc:'#BA7517',p:'#534AB7',pBg:'#EEEDFE',pAcc:'#7F77DD',r:'#993556',rBg:'#FBEAF0'};
const PH={
  1:{nm:'Base e Estabilidade',mo:'Meses 1–2',bg:'#E1F5EE',tx:'#0F6E56',ac:'#1D9E75'},
  2:{nm:'Hipertrofia + Condicionamento',mo:'Meses 3–5',bg:'#E6F1FB',tx:'#185FA5',ac:'#378ADD'},
  3:{nm:'Intensidade e Definição',mo:'Meses 6–9',bg:'#FAEEDA',tx:'#854F0B',ac:'#BA7517'},
  4:{nm:'Performance e Estética',mo:'Meses 10–12',bg:'#EEEDFE',tx:'#534AB7',ac:'#7F77DD'}
};

// ─── TREINO DATA ─────────────────────────────────────────────────────────────
// f: 'w'=kg only, 't'=tempo only, 'b'=both
const ex=(n,s,t,f)=>({n,s,t,f});
const PHASES={
1:{days:[
  {nm:'Full Body Força',du:'~45min',fm:'3 séries · 40s descanso',ex:[
    ex('Agachamento goblet','3 × 12 reps','Joelho: só até onde não doer','w'),
    ex('Barra fixa / australiana','3 × máx','Sem balanço — pare quando a forma quebrar','b'),
    ex('Supino com halteres','3 × 12 reps','Cotovelo a 45° do corpo','w'),
    ex('Hip thrust','3 × 15 reps','Pausa de 1s no topo — esprema o glúteo','w'),
    ex('Prancha frontal','3 × 40 seg','Quadril neutro — não sobe nem afunda','t')]},
  {nm:'HIIT Bodyweight',du:'~40min',fm:'4 voltas · 40s/20s',ex:[
    ex('Flexão de braço','4 × 40 seg','Ritmo controlado — joelhos se necessário','t'),
    ex('Step-up no banco','4 × 40 seg','Empurra pelo calcanhar — joelho estável','t'),
    ex('Mountain climber','4 × 40 seg','Cadência controlada — foco no core','t'),
    ex('Prancha lateral','4 × 20 seg cada','Quadril no alinhamento — não afunda','t'),
    ex('Bird-dog','4 × 40 seg','Lombar neutra — braço e perna opostos','t')]},
  {nm:'Posterior + Core',du:'~45min',fm:'3 séries · 40s descanso',ex:[
    ex('Stiff com halteres','3 × 12 reps','Coluna neutra — quadril vai para trás','w'),
    ex('Cadeira flexora','3 × 15 reps','3 segundos na descida — fase excêntrica','w'),
    ex('Hip thrust unilateral','3 × 10 reps cada','Pausa de 1s no topo — perna livre dobrada','w'),
    ex('Elevação de pernas','3 × 15 reps','Lombar colada no banco — desce lento','t'),
    ex('Prancha com toque no ombro','3 × 20 toques','Sem rotação de quadril — core firme','t')]},
  {nm:'Full Body Força (var.)',du:'~45min',fm:'3 séries · 40s descanso',ex:[
    ex('Leg press','3 × 12 reps','Não trava o joelho — para antes da extensão total','w'),
    ex('Puxada na polia','3 × 12 reps','Puxa para o peito — cotovelo aponta para baixo','w'),
    ex('Desenvolvimento de ombro','3 × 12 reps','Controla a descida — ombros longe das orelhas','w'),
    ex('Paralelas (dips)','3 × máx','Tronco levemente inclinado para frente','b'),
    ex('Cadeira extensora leve','3 × 15 reps','Carga leve — contração no topo','w')]},
  {nm:'Circuito Metabólico',du:'~40min',fm:'3 voltas · 40s/20s',ex:[
    ex('Kettlebell swing','3 × 40 seg','Explosão de quadril — não é força de braço','w'),
    ex('Barra fixa / australiana','3 × 40 seg','Máximo de reps limpas — sem compensação','b'),
    ex('Wall sit','3 × 30 seg','90° no joelho — glúteo ativo','t'),
    ex('Flexão com pés elevados','3 × 40 seg','Core firme — ativa peitoral superior','t'),
    ex('Russian twist com halter','3 × 40 seg','Rotação do tronco — pés levemente elevados','w')]},
  {nm:'Mobilidade + Core + Cardio',du:'~50min',fm:'Baixa intensidade',ex:[
    ex('Mobilidade de quadril','10 min','Rotação deitado — suave — cada lado','t'),
    ex('Prancha frontal','3 × 45 seg','Respiração controlada — não prende o ar','t'),
    ex('Dead bug','3 × 10 cada lado','Lombar no chão — braço e perna opostos — lento','t'),
    ex('Prancha lateral','3 × 30 seg cada','Quadril elevado — linha reta da cabeça ao pé','t'),
    ex('Cardio leve (bike / esteira)','20 min','Inclinação 8–12% — ritmo de conversa','t')]}
]},
2:{days:[
  {nm:'Upper A — Supersets',du:'~50min',fm:'4 séries · 30s descanso entre pares',ex:[
    ex('Supino com halteres','4 × 10 reps','Carga maior que Fase 1 — descida em 3s','w'),
    ex('Barra fixa (superset c/ supino)','4 × máx','Sem pausa entre 1A e 1B','b'),
    ex('Crucifixo inclinado','4 × 12 reps','Cotovelo levemente dobrado — arco natural','w'),
    ex('Remada curvada c/ halteres','4 × 12 reps','Escápula retrai no topo','w'),
    ex('Desenvolvimento de ombro','3 × 12 reps','Controla a descida','w'),
    ex('Paralelas (dips)','3 × máx','Tronco inclinado para frente','b'),
    ex('Rosca direta c/ halteres','3 × 12 reps','Cotovelo fixo — supinação no topo','w')]},
  {nm:'Lower A — Quadríceps + Glúteo',du:'~50min',fm:'4 séries · 40s descanso',ex:[
    ex('Agachamento goblet pesado','4 × 12 reps','Desça um pouco mais fundo que Fase 1','w'),

function renderDashboard(){
  const log=getLog();const metrics=getMetrics();
  const wdData=getWD();
  // KPIs
  let streak=0;
  for(let i=log.length-1;i>=0;i--){if(log[i].done>0)streak++;else break;}
  const total=log.length;
  const first=metrics[metrics.length-1];const last=metrics[0];
  const weightDelta=first&&last?(last.peso-first.peso).toFixed(1):null;
  document.getElementById('kpi-grid').innerHTML=[
    {v:total,l:'Treinos feitos',bg:C.gBg,tx:C.g},
    {v:`${streak}🔥`,l:'Dias seguidos',bg:C.aBg,tx:C.a},
    {v:weightDelta?`${weightDelta>0?'+':''}${weightDelta}kg`:'—',l:'Variação peso',bg:C.pBg,tx:C.p}
  ].map(k=>`<div class="kpi" style="background:${k.bg}"><div class="kpi-v" style="color:${k.tx}">${k.v}</div><div class="kpi-l">${k.l}</div></div>`).join('');

  // Week view — current week from log
  const today=new Date();
  const weekStart=new Date(today);weekStart.setDate(today.getDate()-today.getDay()+1);
  const weekDone=new Array(7).fill(0);
  log.forEach(e=>{
    const d=parseDate(e.date);
    if(d>=weekStart){const idx=(d.getDay()+6)%7;if(idx<6)weekDone[idx]=1;}
  });
  document.getElementById('week-view').innerHTML=`<span class="st">Esta semana</span>
  <div class="wk-grid" style="margin-bottom:4px">${['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'].map(d=>`<div class="wk-lbl">${d}</div>`).join('')}</div>
  <div class="wk-grid">${weekDone.map((d,i)=>`<div class="wk-cell ${d?'done':'empty'}">${d?checkSVG():''}</div>`).join('')}</div>
  <div style="display:flex;justify-content:space-between;margin-top:10px;font-size:11px">
    <span style="color:var(--ts)">${weekDone.filter(Boolean).length} de 6 treinos</span>
    <span style="color:${C.g};font-weight:600">${total>0?Math.round(total/Math.max(1,Math.ceil((Date.now()-parseDate(log[log.length-1]?.date||new Date().toLocaleDateString('pt-BR')).getTime())/(7*86400000))))*10/10:0} treinos/semana (média)</span>
  </div>`;

  // Phase progress
  document.getElementById('phase-progress').innerHTML=`<span class="st">Progresso do programa — 12 meses</span>`+
  [1,2,3,4].map(ph=>{
    const pc=PH[ph];
    const phLogs=log.filter(e=>e.phase===ph);
    const totalPh=ph===1?48:ph===2?72:ph===3?96:72;
    const pct=Math.min(100,Math.round(phLogs.length/totalPh*100));
    return `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:12px;font-weight:500;color:${pct>0?pc.tx:'var(--ts)'}">${pc.nm}</span>
        <span style="font-size:10px;color:var(--ts)">${pc.mo} · ${pct}%</span>
      </div>
      <div class="ph-bar-wrap"><div class="ph-bar" style="width:${pct}%;background:${pc.ac}"></div></div>
    </div>`;
  }).join('');

  // Next workout
  const ph=PH[S.phase];const wd=PHASES[S.phase].days[S.day];
  document.getElementById('next-workout').innerHTML=`<div style="background:${ph.bg};border:1px solid ${ph.ac};border-radius:12px;padding:13px 14px;margin-bottom:10px">
    <div style="font-size:10px;font-weight:700;color:${ph.tx};letter-spacing:.5px;margin-bottom:5px">PRÓXIMO TREINO</div>
    <div style="font-size:15px;font-weight:700;margin-bottom:4px">${DN[S.day]} · ${wd.nm}</div>
    <div style="font-size:12px;color:var(--ts);margin-bottom:10px">${ph.mo} · ${wd.du} · ${wd.fm}</div>
    <div style="display:flex;flex-wrap:wrap;gap:5px">${wd.ex.map(e=>`<span style="font-size:10px;padding:3px 9px;border-radius:10px;background:rgba(255,255,255,.6);color:${ph.tx};font-weight:500">${e.n}</span>`).join('')}</div>
  </div>`;

  // Weight mini chart
  const mdata=metrics.slice().reverse();
  if(mdata.length>0){
    const latest=mdata[mdata.length-1];const oldest=mdata[0];
    const delta=(latest.peso-oldest.peso).toFixed(1);
    document.getElementById('dash-weight-info').innerHTML=`<span style="font-size:22px;font-weight:800;color:${C.g}">${latest.peso} kg</span><span style="font-size:12px;color:${delta>0?C.r:C.g};font-weight:600">${delta>0?'+':''}${delta}kg desde o início</span>`;
    mkChart('chart-dash-weight',{type:'line',data:{labels:mdata.map(m=>m.date),datasets:[{data:mdata.map(m=>m.peso),borderColor:C.gAcc,backgroundColor:C.gBg+'88',borderWidth:2.5,pointRadius:3,pointBackgroundColor:C.gAcc,tension:.4,fill:true}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:v=>`${v.raw} kg`}}},scales:{x:{ticks:{font:{size:9}}},y:{ticks:{font:{size:9}}}}}});
  } else {
    document.getElementById('dash-weight-info').innerHTML=`<span style="font-size:13px;color:var(--ts)">Nenhuma métrica registrada ainda</span>`;
    document.getElementById('chart-dash-weight').style.display='none';
  }
}

function parseDate(str){if(!str)return new Date();const p=str.split('/');if(p.length===3)return new Date(+('20'+p[2].slice(-2)),+p[1]-1,+p[0]);if(p.length===2)return new Date(new Date().getFullYear(),+p[1]-1,+p[0]);return new Date();}

// ─── TREINO ───────────────────────────────────────────────────────────────────
function renderTreino(){
  const ph=PH[S.phase];
  document.getElementById('phase-seg').innerHTML=[1,2,3,4].map(n=>`<button class="${S.phase===n?'on':''}" style="${S.phase===n?`background:${PH[n].bg};color:${PH[n].tx};`:''}" onclick="selPhase(${n})">Fase ${n}</button>`).join('');
  document.getElementById('phase-banner').innerHTML=`<div><div style="font-size:11px;font-weight:500;color:${ph.tx};margin-bottom:3px">${ph.mo}</div><div style="font-size:15px;font-weight:700">${ph.nm}</div></div><span style="font-size:11px;color:${ph.tx};font-weight:600">${PHASES[S.phase].days[S.day].du}</span>`;
  document.getElementById('phase-banner').style.cssText+=`background:${ph.bg};`;
  document.getElementById('day-pills').innerHTML=DN.map((d,i)=>`<span class="pill ${S.day===i?'on':''}" style="${S.day===i?`background:${ph.bg};color:${ph.tx};border-color:${ph.ac};`:''}" onclick="selDay(${i})">${d}</span>`).join('');

  const wd=PHASES[S.phase].days[S.day];const cur=curWD();
  const done=wd.ex.filter((_,i)=>cur.ch[i]).length;
  const pct=Math.round(done/wd.ex.length*100);

  document.getElementById('workout-card').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
      <div><div style="font-size:15px;font-weight:700">${wd.nm}</div><div style="font-size:12px;color:var(--ts);margin-top:2px">${wd.fm}</div></div>
      <span style="font-size:12px;font-weight:700;color:${ph.tx}">${done}/${wd.ex.length}</span>
    </div>
    <div class="pbar-wrap"><div class="pbar" style="width:${pct}%;background:${ph.ac}"></div></div>
    ${wd.ex.map((e,i)=>{
      const ck=cur.ch[i];
      const showKg=e.f==='w'||e.f==='b';
      const showTm=e.f==='t'||e.f==='b';
      return `<div class="ex-row">
        <div class="chk ${ck?'ck':''}" onclick="toggleEx(${i})" style="${ck?`background:${ph.ac};`:`border-color:${ph.tx}44;`}">${ck?checkSVG():''}</div>
        <div style="opacity:${ck?.4:1}">
          <div class="ex-name ${ck?'ck':''}">${e.n}</div>
          <div class="ex-sets" style="color:${ph.tx}">${e.s}</div>
          <div class="ex-tip">${e.t}</div>
        </div>
        <div class="ex-fields">
          ${showKg?`<div class="fl"><span>kg</span><input type="number" step="0.5" placeholder="—" value="${cur.wt[i]||''}" oninput="setKg(${i},this.value)"></div>`:''}
          ${showTm?`<div class="fl"><span>tempo</span><input type="text" placeholder="—" value="${cur.tm[i]||''}" oninput="setTm(${i},this.value)"></div>`:''}
        </div>
      </div>`;
    }).join('')}`;

  document.getElementById('workout-ok').innerHTML=done===wd.ex.length&&done>0?`<div class="ok-msg" style="background:${ph.bg};border:1px solid ${ph.ac};color:${ph.tx}">🏆 Treino concluído — ótimo trabalho! <button onclick="logWorkout()" style="margin-left:8px;padding:4px 10px;font-size:11px;font-weight:600;border-radius:6px;cursor:pointer;background:${ph.ac};color:#fff;border:none">Registrar na timeline</button></div>`:'';
}

function toggleEx(i){const cur=curWD();cur.ch={...cur.ch,[i]:!cur.ch[i]};saveWD(cur);renderTreino();}
function setKg(i,v){const cur=curWD();cur.wt={...cur.wt,[i]:v};saveWD(cur);}
function setTm(i,v){const cur=curWD();cur.tm={...cur.tm,[i]:v};saveWD(cur);}
function selPhase(n){S.phase=n;S.day=0;renderTreino();}
function selDay(i){S.day=i;renderTreino();}

function logWorkout(){
  const wd=PHASES[S.phase].days[S.day];const cur=curWD();
  const done=wd.ex.filter((_,i)=>cur.ch[i]).length;
  const log=getLog();
  const date=new Date().toLocaleDateString('pt-BR');
  const exists=log.findIndex(e=>e.date===date&&e.phase===S.phase&&e.day===S.day);
  const entry={date,phase:S.phase,day:S.day,dayName:DN[S.day],nm:wd.nm,done,total:wd.ex.length,note:'',exercises:wd.ex.map((e,i)=>({...e,kg:cur.wt[i]||'',time:cur.tm[i]||'',checked:!!cur.ch[i]}))};
  if(exists>=0)log[exists]=entry;else log.unshift(entry);
  setLog(log);
  document.getElementById('workout-ok').innerHTML+=`<div style="text-align:center;font-size:12px;color:${C.g};margin-top:6px">✓ Registrado na timeline!</div>`;
}

// ─── NUTRIÇÃO ─────────────────────────────────────────────────────────────────
function renderNutricao(){
  document.getElementById('week-seg').innerHTML=[0,1,2,3].map(w=>`<button class="${S.week===w?'on':''}" onclick="selWeek(${w})">Semana ${w+1}</button>`).join('');

      <div class="mmac"><span style="color:${C.b};font-weight:500">${opt.p}g prot</span><span style="color:${C.a};font-weight:500">${opt.c}g carb</span><span style="color:${C.r};font-weight:500">${opt.f}g gord</span><span style="margin-left:auto;font-weight:500;color:var(--ts)">${opt.k} kcal</span></div>

  <div class="tb-grid">
    <div><div class="tb-v" style="color:${C.b}">${tp}g</div><div class="tb-l">proteína</div></div>
    <div><div class="tb-v" style="color:${C.a}">${tc}g</div><div class="tb-l">carboidrato</div></div>
    <div><div class="tb-v" style="color:${C.r}">${tf}g</div><div class="tb-l">gordura</div></div>
    <div><div class="tb-v">${tk}</div><div class="tb-l">kcal total</div></div>
  </div>`;
}

function selWeek(w){S.week=w;renderNutricao();}
function selMday(i){S.mday=i;renderNutricao();}
function setMC(mi,c){const d=curMC();d[mi]=c;saveMC(d);renderNutricao();}

// ─── RELATÓRIOS ───────────────────────────────────────────────────────────────
function renderRelatorios(){
  const views=[['semana','📅 Semanal'],['mensal','🗓️ Mensal'],['metricas','📏 Métricas'],['musculos','💪 Grupos'],['exportar','⬇️ Exportar']];
  document.getElementById('report-subnav').innerHTML=views.map(([k,l])=>`<span class="spill ${S.rview===k?'on':''}" onclick="setRview('${k}')">${l}</span>`).join('');

  if(S.rview==='semana')renderRSemana(el);

  else if(S.rview==='metricas')renderRMetricas(el);
  else if(S.rview==='musculos')renderRMusculos(el);
  else if(S.rview==='exportar')renderRExportar(el);
}
function setRview(v){S.rview=v;renderRelatorios();}

function renderRSemana(el){
  const log=getLog();
  // Build heatmap: last 8 weeks
  const hmap=[];
  const now=new Date();
  for(let w=7;w>=0;w--){
    const wstart=new Date(now);wstart.setDate(now.getDate()-(now.getDay()+6)%7-w*7);
    const days=[];
    for(let d=0;d<7;d++){
      const date=new Date(wstart);date.setDate(wstart.getDate()+d);
      const dStr=date.toLocaleDateString('pt-BR').slice(0,5);
      days.push(log.some(e=>e.date&&e.date.startsWith(dStr)&&e.done>0)?1:0);
    }
    const wLbl=wstart.toLocaleDateString('pt-BR').slice(0,5);
    hmap.push({w:wLbl,d:days});
  }

  // Weekly counts
  const wCounts=[];
  for(let w=5;w>=0;w--){
    const wstart=new Date(now);wstart.setDate(now.getDate()-(now.getDay()+6)%7-w*7);
    const wend=new Date(wstart);wend.setDate(wstart.getDate()+6);
    const count=log.filter(e=>{const d=parseDate(e.date);return d>=wstart&&d<=wend&&e.done>0;}).length;
    wCounts.push({sem:`S${6-w}`,treinos:count});
  }

  const total=log.length;
  const bestW=Math.max(...wCounts.map(w=>w.treinos));
  const avgW=(wCounts.reduce((a,b)=>a+b.treinos,0)/Math.max(1,wCounts.length)).toFixed(1);

  el.innerHTML=`
  <div class="card">
    <span class="st">Heatmap de atividade — últimas 8 semanas</span>
    <div class="hm">
      <div class="hm-days">${['S','T','Q','Q','S','S','D'].map(d=>`<span>${d}</span>`).join('')}</div>
      ${hmap.map(wk=>`<div class="hm-col">
        <div class="hm-wl">${wk.w.slice(0,5)}</div>
        ${wk.d.map((d,di)=>`<div class="hm-cell" style="background:${d?(di===6?'#94A3B8':C.gAcc):'#F1F5F9'}"></div>`).join('')}
      </div>`).join('')}
    </div>
    <div style="display:flex;gap:12px;margin-top:10px;font-size:10px;color:var(--ts)">
      <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:${C.gAcc};display:inline-block"></span>Treino</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#94A3B8;display:inline-block"></span>Descanso</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#F1F5F9;display:inline-block"></span>Não realizado</span>
    </div>
  </div>
  <div class="card">
    <span class="st">Treinos por semana</span>
    <canvas id="chart-weekly" height="130"></canvas>
  </div>
  <div class="sum-grid">
    ${[{v:bestW,l:'Melhor semana',s:'treinos em um único período',bg:C.gBg,c:C.g},
       {v:total,l:'Total de treinos',s:'desde o início',bg:C.bBg,c:C.b},
       {v:avgW,l:'Média semanal',s:'treinos por semana',bg:C.pBg,c:C.p},
       {v:total>0?Math.round(total*.75)+'h':0,l:'Tempo estimado',s:'média 45min/treino',bg:C.aBg,c:C.a}
    ].map(s=>`<div class="sum-card" style="background:${s.bg}"><div class="sum-v" style="color:${s.c}">${s.v}</div><div class="sum-l">${s.l}</div><div class="sum-s">${s.s}</div></div>`).join('')}
  </div>`;

  mkChart('chart-weekly',{type:'bar',data:{labels:wCounts.map(w=>w.sem),datasets:[{data:wCounts.map(w=>w.treinos),backgroundColor:C.gAcc+'CC',borderRadius:5,borderSkipped:false}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:v=>`${v.raw} treinos`}}},scales:{x:{ticks:{font:{size:10}}},y:{ticks:{font:{size:10}},max:7,min:0}}}});
}

function renderRMensal(el){
  const log=getLog();
  const now=new Date();const year=now.getFullYear();const month=now.getMonth();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const firstDay=(new Date(year,month,1).getDay()+6)%7;
  const monthName=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][month];
  const doneDays=new Set();
  const restDays=new Set([0,6].includes(new Date(year,month,1).getDay())?[]:[]); // sundays
  log.forEach(e=>{if(e.date){const d=parseDate(e.date);if(d.getMonth()===month&&d.getFullYear()===year)doneDays.add(d.getDate());}});

  const trainCount=doneDays.size;
  const workDays=daysInMonth-4; // approx 4 sundays
  const pct=Math.round(trainCount/workDays*100);

  el.innerHTML=`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:16px;font-weight:700">${monthName} ${year}</span>
      <span style="font-size:11px;color:${C.g};font-weight:600">${trainCount} treinos · ${pct}%</span>
    </div>
    <div class="cal-hdr">${['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map(d=>`<span>${d}</span>`).join('')}</div>
    <div class="cal-grid">
      ${Array.from({length:firstDay},(_,i)=>`<div class="cal-day"></div>`).join('')}
      ${Array.from({length:daysInMonth},(_,i)=>{
        const day=i+1;const done=doneDays.has(day);
        const isSun=(new Date(year,month,day).getDay()===0);
        const future=day>now.getDate();
        return `<div class="cal-day ${done?'done':isSun?'rest':future?'future':''}">${day}</div>`;
      }).join('')}
    </div>
    <div style="display:flex;gap:12px;margin-top:12px;font-size:10px;color:var(--ts)">
      <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:3px;background:${C.gAcc};display:inline-block"></span>Treino feito</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:3px;background:#F1F5F9;display:inline-block"></span>Descanso</span>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
    ${[{v:trainCount,l:'Treinos feitos',bg:C.gBg,c:C.g},{v:Math.max(0,Math.round(daysInMonth/7)),l:'Descansos',bg:C.aBg,c:C.a},{v:pct+'%',l:'Aproveitamento',bg:C.pBg,c:C.p}].map(s=>`<div style="background:${s.bg};border-radius:10px;padding:10px"><div style="font-size:22px;font-weight:800;color:${s.c}">${s.v}</div><div style="font-size:10px;color:var(--ts);margin-top:2px">${s.l}</div></div>`).join('')}
  </div>`;
}

function renderRMetricas(el){
  const metrics=getMetrics().slice().reverse();
  const mkOpts=['peso','cintura','peito','braco','coxa'];
  const mkCfg={peso:{l:'Peso (kg)',c:C.p,dom:[75,80]},cintura:{l:'Cintura (cm)',c:C.a,dom:[80,90]},peito:{l:'Peito (cm)',c:C.b,dom:[98,105]},braco:{l:'Braço (cm)',c:C.g,dom:[33,38]},coxa:{l:'Coxa (cm)',c:C.r,dom:[53,58]}};
  const cfg=mkCfg[S.mkey];

  el.innerHTML=`<div class="msel">${mkOpts.map(k=>`<button onclick="setMkey('${k}')" style="background:${S.mkey===k?`${mkCfg[k].c}18`:'transparent'};color:${mkCfg[k].c};border-color:${S.mkey===k?mkCfg[k].c:'transparent'};font-weight:${S.mkey===k?700:500}">${mkCfg[k].l.split(' ')[0]}</button>`).join('')}</div>
  <div class="card">
    <span class="st">${cfg.l} — evolução</span>
    ${metrics.length>0?`<canvas id="chart-metric" height="150"></canvas>`:`<div class="empty-state" style="padding:1.5rem"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><div>Nenhuma métrica registrada</div><div style="font-size:12px;margin-top:4px">Vá em <b>Corpo</b> e registre suas medidas</div></div>`}
  </div>
  <div class="card">
    <span class="st">Comparativo início → atual</span>
    ${metrics.length>=2?[
      {l:'Peso',k:'peso',u:'kg',good:v=>v<0},
      {l:'Cintura',k:'cintura',u:'cm',good:v=>v<0},
      {l:'Peito',k:'peito',u:'cm',good:v=>v>0},
      {l:'Braço',k:'braco',u:'cm',good:v=>v>0},
      {l:'Coxa',k:'coxa',u:'cm',good:v=>v>0}
    ].filter(r=>metrics[0][r.k]&&metrics[metrics.length-1][r.k]).map((r,i,arr)=>{
      const ini=+metrics[metrics.length-1][r.k];const atu=+metrics[0][r.k];const delta=atu-ini;
      const isGood=r.good(delta);
      return `<div class="cmp-row" style="${i===arr.length-1?'border-bottom:none':''}">
        <div style="flex:1;font-size:13px;font-weight:500">${r.l}</div>
        <div style="font-size:11px;color:var(--ts);margin-right:12px">${ini}${r.u} → ${atu}${r.u}</div>
        <div style="font-size:13px;font-weight:700;color:${isGood?C.g:C.r}">${delta>0?'+':''}${delta.toFixed(1)}${r.u}</div>
      </div>`;
    }).join(''):`<div style="font-size:13px;color:var(--ts);text-align:center;padding:1rem">Registre pelo menos 2 métricas para ver o comparativo</div>`}
  </div>`;

  if(metrics.length>0){
    setTimeout(()=>{
      mkChart('chart-metric',{type:'line',data:{labels:metrics.map(m=>m.date),datasets:[{data:metrics.map(m=>+m[S.mkey]).filter(Boolean),borderColor:cfg.c,backgroundColor:`${cfg.c}18`,borderWidth:2.5,pointRadius:4,pointBackgroundColor:cfg.c,tension:.4,fill:true}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:v=>`${v.raw}`}}},scales:{x:{ticks:{font:{size:9},maxTicksLimit:6}},y:{ticks:{font:{size:9}}}}}});
    },50);
  }
}

function setMkey(k){S.mkey=k;renderRelatorios();}

function renderRMusculos(el){
  el.innerHTML=`<div class="card">
    <span class="st">Radar — cobertura muscular</span>
    <canvas id="chart-radar" height="220"></canvas>
  </div>
  <div class="card">
    <span class="st">Frequência por grupo muscular</span>
    ${MUSCLES.map(m=>`<div class="mb-row">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:12px;font-weight:500">${m.nm}</span>
        <span style="font-size:11px;color:var(--ts)">${Math.round(m.pct/100*20)} sessões</span>

    <div style="font-size:12px;font-weight:700;color:${C.g};margin-bottom:6px">💡 Análise automática</div>
    <div style="font-size:12px;line-height:1.7">Glúteo e cadeia posterior estão bem trabalhados — essencial para proteger o LCA. Core com boa frequência. Nas próximas semanas, intensifique peitoral superior e ombros para acelerar o desenvolvimento do "V" nas costas.</div>

  setTimeout(()=>{

  },50);
}

function renderRExportar(el){
  const log=getLog();const metrics=getMetrics();
  el.innerHTML=`<div class="card">
    <span class="st">Exportar dados</span>
    <p style="font-size:13px;color:var(--ts);margin-bottom:16px;line-height:1.6">Exporte seus dados de treino e métricas corporais para CSV. Abre em qualquer aplicativo de planilha (Excel, Google Sheets).</p>
    <button class="export-btn" onclick="exportCSV('log')">📥 Exportar histórico de treinos (${log.length} registros)</button>
    <button class="export-btn" onclick="exportCSV('metrics')">📥 Exportar métricas corporais (${metrics.length} registros)</button>
  </div>
  <div class="card">
    <span class="st">Resumo geral</span>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${[['Treinos registrados',log.length,'📋'],['Métricas corporais',metrics.length+'registros','📏'],['Fase atual',`Fase ${S.phase} — ${PH[S.phase].nm}`,'🏋️'],['Consistência estimada',log.length>0?Math.round(log.filter(e=>e.done===e.total).length/log.length*100)+'%':'—','🎯']].map(([l,v,i])=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bd)"><span style="font-size:13px;font-weight:500">${i} ${l}</span><span style="font-size:13px;font-weight:700;color:${C.g}">${v}</span></div>`).join('')}
    </div>
  </div>`;
}

function exportCSV(type){
  const log=getLog();const metrics=getMetrics();
  let csv='',filename='';
  if(type==='log'){
    csv='Data,Fase,Dia,Treino,Exercicios Feitos,Total,Nota\n';
    log.forEach(e=>{csv+=`${e.date},${e.phase},${e.dayName||''},${e.nm},${e.done},${e.total},"${e.note||''}"\n`;});
    filename='treinos.csv';
  } else {
    csv='Data,Peso,Cintura,Peito,Braco,Coxa\n';
    metrics.forEach(m=>{csv+=`${m.date},${m.peso||''},${m.cintura||''},${m.peito||''},${m.braco||''},${m.coxa||''}\n`;});
    filename='metricas.csv';
  }
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
}

// ─── CORPO ───────────────────────────────────────────────────────────────────
function renderCorpo(){
  const metrics=getMetrics();
  const hist=document.getElementById('metric-history');
  if(!metrics.length){hist.innerHTML=`<div class="empty-state"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><div style="font-size:14px;font-weight:500;margin-bottom:4px">Nenhum registro ainda</div><div style="font-size:12px">Este é o dia zero. Registre agora para ter um ponto de partida dos seus 12 meses.</div></div>`;return;}
  const first=metrics[metrics.length-1];
  const fields=[['peso','kg',C.p],['cintura','cm',C.a],['peito','cm',C.b],['braco','cm',C.g],['coxa','cm',C.r]];
  hist.innerHTML=`<div style="font-size:12px;font-weight:500;color:var(--ts);margin-bottom:8px">${metrics.length} registro${metrics.length>1?'s':''}</div>`+
  metrics.map((m,i)=>{
    const delta=i<metrics.length-1&&first.peso&&m.peso?(+m.peso-+first.peso).toFixed(1):null;
    return `<div class="hc">
      <div class="hc-hdr">
        <span>${m.date}${i===0?` <span style="background:${C.gBg};color:${C.g};font-size:10px;padding:1px 7px;border-radius:10px;margin-left:6px;font-weight:600">atual</span>`:''}</span>
        ${delta!==null?`<span style="font-weight:700;font-size:13px;color:${delta>0?C.r:C.g}">${delta>0?'+':''}${delta} kg vs início</span>`:'<span style="font-size:10px;color:var(--ts)">ponto de partida</span>'}
      </div>
      <div class="hc-vals">${fields.filter(([k])=>m[k]).map(([k,u,c])=>`<div><div class="hc-v" style="color:${c}">${m[k]}<span style="font-size:10px;font-weight:400;margin-left:1px">${u}</span></div><div class="hc-l">${k}</div></div>`).join('')}</div>
    </div>`;
  }).join('');
}

function saveMetric(){
  const fields=['peso','cintura','peito','braco','coxa'];
  const entry={date:new Date().toLocaleDateString('pt-BR')};
  let hasData=false;
  fields.forEach(f=>{const v=document.getElementById('inp-'+f).value;if(v){entry[f]=v;hasData=true;}});
  if(!entry.peso){alert('Informe pelo menos o peso para salvar.');return;}
  const metrics=getMetrics();metrics.unshift(entry);setMetrics(metrics);
  fields.forEach(f=>{document.getElementById('inp-'+f).value='';});
  renderCorpo();
}

// ─── TIMELINE ─────────────────────────────────────────────────────────────────
function renderTimeline(){
  const log=getLog();
  const filters=[['todos','Todos'],['1','Fase 1'],['2','Fase 2'],['3','Fase 3'],['4','Fase 4']];
  document.getElementById('tl-filter-pills').innerHTML=filters.map(([k,l])=>`<span class="pill ${S.tlfilter===k?'onp':''}" onclick="setTlFilter('${k}')">${l}</span>`).join('');
  const filtered=S.tlfilter==='todos'?log:log.filter(e=>e.phase===+S.tlfilter);
  document.getElementById('tl-count').textContent=`${filtered.length} registros`;

  if(!filtered.length){
    document.getElementById('timeline-list').innerHTML=`<div class="empty-state"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1.5"/><circle cx="3" cy="12" r="1.5"/><circle cx="3" cy="18" r="1.5"/></svg><div style="font-size:14px;font-weight:500;margin-bottom:4px">Nenhum treino registrado</div><div style="font-size:12px">Complete um treino e clique em "Registrar na timeline"</div></div>`;
    return;
  }

  document.getElementById('timeline-list').innerHTML=filtered.map((entry,i)=>{
    const pc=PH[entry.phase];const allDone=entry.done===entry.total;const isLast=i===filtered.length-1;
    return `<div class="tl-item">
      <div class="tl-dot-wrap">
        <div class="tl-dot" style="background:${allDone?pc.ac:'#F1F5F9'};border:2px solid ${allDone?pc.ac:'var(--bd)'}">
          ${allDone?checkSVG():`<span style="font-size:9px;font-weight:700;color:var(--ts)">${entry.done}/${entry.total}</span>`}
        </div>
        ${!isLast?`<div class="tl-line"></div>`:''}
      </div>
      <div class="tl-content" style="${isLast?'padding-bottom:0':''}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div style="font-size:13px;font-weight:600;margin-bottom:3px">${entry.nm}</div>
            <div style="display:flex;gap:5px;align-items:center">
              <span style="font-size:10px;font-weight:600;padding:1px 8px;border-radius:10px;background:${pc.bg};color:${pc.tx}">Fase ${entry.phase}</span>
              <span style="font-size:11px;color:var(--ts)">${entry.dayName||''}</span>
              ${allDone?`<span style="font-size:10px;color:${C.g}">✓ Completo</span>`:''}
            </div>
          </div>
          <span style="font-size:11px;color:var(--ts);flex-shrink:0;margin-left:8px">${entry.date}</span>
        </div>
        ${entry.note?`<div class="tl-note">📝 ${entry.note}</div>`:''}
        ${!allDone?`<div style="font-size:11px;color:${C.a};margin-top:5px">⚠️ ${entry.total-entry.done} exercício(s) não concluído(s)</div>`:''}
        ${entry.exercises?`<button onclick="toggleExDetail(this)" style="font-size:11px;color:var(--ts);background:none;border:none;cursor:pointer;margin-top:5px;padding:0">▶ Ver exercícios</button><div class="ex-detail" style="display:none;margin-top:6px">${entry.exercises.filter(e=>e.checked).map(e=>`<div style="font-size:11px;padding:3px 0;display:flex;gap:6px"><span style="color:${C.g}">✓</span><span>${e.n}</span>${e.kg?`<span style="color:var(--ts)">${e.kg}kg</span>`:''}${e.time?`<span style="color:var(--ts)">${e.time}</span>`:''}</div>`).join('')}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function setTlFilter(f){S.tlfilter=f;renderTimeline();}
function toggleExDetail(btn){const el=btn.nextElementSibling;el.style.display=el.style.display==='none'?'block':'none';btn.textContent=(el.style.display==='block'?'▼':'▶')+' Ver exercícios';}

// ─── INIT ─────────────────────────────────────────────────────────────────────
go('dashboard');
</script>
