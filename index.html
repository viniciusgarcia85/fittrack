<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>FitTrack · Vinícius</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg2);color:var(--text);font-size:14px;transition:background .3s,color .3s;min-height:100vh}
:root{--g:#0F6E56;--gBg:#E1F5EE;--gAcc:#1D9E75;--b:#185FA5;--bBg:#E6F1FB;--a:#854F0B;--aBg:#FAEEDA;--aAcc:#BA7517;--p:#534AB7;--pBg:#EEEDFE;--pAcc:#7F77DD;--r:#993556;--rBg:#FBEAF0}
[data-theme=light]{--bg:#fff;--bg2:#f8fafc;--bg3:#f1f5f9;--text:#0f172a;--ts:#64748b;--bd:#e2e8f0;--sh:0 1px 4px rgba(0,0,0,.06);--card:#fff}
[data-theme=dark]{--bg:#0f172a;--bg2:#1e293b;--bg3:#273549;--text:#f1f5f9;--ts:#94a3b8;--bd:#334155;--sh:0 1px 4px rgba(0,0,0,.3);--card:#1e293b;--gBg:#052e16;--bBg:#0f2543;--aBg:#3a1500;--pBg:#1a1536;--rBg:#2d0a16}
#app{display:flex;min-height:100vh}
/* SIDEBAR */
.sidebar{width:220px;flex-shrink:0;background:var(--bg);border-right:1px solid var(--bd);display:none;flex-direction:column;position:sticky;top:0;height:100vh;padding:20px 0;overflow:auto}
.sidebar-logo{padding:0 18px 20px;border-bottom:1px solid var(--bd);margin-bottom:12px}
.sidebar-logo h2{font-size:17px;font-weight:800;color:var(--g)}
.sidebar-logo p{font-size:11px;color:var(--ts);margin-top:2px}
.sb-nav{flex:1;padding:0 10px}
.sb-btn{width:100%;display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:500;color:var(--ts);margin-bottom:2px;text-align:left;transition:all .15s}
.sb-btn:hover{background:var(--bg2)}
.sb-btn.on{background:var(--gBg);color:var(--g);font-weight:700}
.sb-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.7;flex-shrink:0}
.sb-footer{padding:12px 10px;border-top:1px solid var(--bd);margin-top:auto}
/* MAIN */
.main-area{flex:1;min-width:0;display:flex;flex-direction:column;max-width:100%}
.hdr{padding:14px 20px 12px;background:var(--bg);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.hdr-left h1{font-size:18px;font-weight:700;color:var(--text)}
.hdr-left p{font-size:12px;color:var(--ts);margin-top:2px}
.theme-btn{padding:7px 8px;border-radius:8px;border:1px solid var(--bd);background:var(--bg2);cursor:pointer;display:flex;align-items:center;gap:5px;font-size:12px;font-weight:500;color:var(--ts)}
.theme-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.7}
/* PANELS */
.pnl{display:none;padding:20px;flex:1}
.pnl.on{display:block}
/* BOTTOM NAV (mobile) */
.nav{display:flex;background:var(--bg);border-top:1px solid var(--bd);position:fixed;bottom:0;left:0;right:0;z-index:99}
.nb{flex:1;padding:9px 2px 7px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px;font-weight:600;color:var(--ts);transition:color .15s}
.nb.on{color:var(--g)}
.nb svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.7}
/* DESKTOP GRID */
@media(min-width:768px){
  body{padding-bottom:0}
  .sidebar{display:flex}
  .nav{display:none}
  .pnl{padding:24px 28px}
  .dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
  .dash-grid .span2{grid-column:span 2}
  .stats4{grid-template-columns:repeat(4,1fr)!important}
  .sum-grid{grid-template-columns:repeat(4,1fr)!important}
  .meal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .meal-grid .meal-full{grid-column:span 2}
}
@media(max-width:767px){.main-area{padding-bottom:68px}}
/* CARDS */
.card{background:var(--card,var(--bg));border:1px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:var(--sh)}
.card-accent{border-radius:14px;padding:16px;margin-bottom:12px}
.st{font-size:10px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:12px}
/* SEGMENTS */
.seg{display:flex;border:1px solid var(--bd);border-radius:9px;overflow:hidden;margin-bottom:14px;background:var(--bg2)}
.seg button{flex:1;padding:7px 4px;font-size:11px;font-weight:500;text-align:center;cursor:pointer;border:none;background:transparent;color:var(--ts);transition:all .15s}
.seg button:not(:last-child){border-right:1px solid var(--bd)}
.seg button.on{background:var(--gBg);color:var(--g);font-weight:700}
/* PILLS */
.pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.pills::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:6px 14px;font-size:12px;font-weight:500;border-radius:20px;cursor:pointer;border:1px solid var(--bd);background:var(--bg);color:var(--ts);white-space:nowrap;transition:all .15s}
.pill.on{background:var(--gBg);color:var(--g);border-color:var(--gAcc);font-weight:700}
.pill.onb{background:var(--bBg);color:var(--b);border-color:var(--b);font-weight:700}
.pill.onp{background:var(--pBg);color:var(--p);border-color:var(--p);font-weight:700}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.kpi{border-radius:12px;padding:14px 12px}
.kpi-v{font-size:22px;font-weight:800}
.kpi-l{font-size:11px;color:var(--ts);margin-top:3px}
/* PHASE PROGRESS */
.ph-bar-wrap{height:7px;background:var(--bg2);border-radius:4px}
.ph-bar{height:100%;border-radius:4px;transition:width .5s}
/* EXERCISE ROWS */
.ex-row{display:grid;grid-template-columns:30px 1fr auto;gap:0 12px;padding:13px 0;border-bottom:1px solid var(--bd);align-items:start}
.ex-row:last-child{border-bottom:none}
.chk{width:28px;height:28px;border-radius:8px;cursor:pointer;border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;transition:all .2s;background:var(--bg);user-select:none}
.chk.ck{border:none}
.ex-name{font-size:13px;font-weight:600;line-height:1.3;color:var(--text)}
.ex-name.ck{text-decoration:line-through;opacity:.35}
.ex-sets{font-size:12px;font-weight:600;margin-top:4px}
.ex-tip{font-size:11px;color:var(--ts);margin-top:3px;line-height:1.45}
.ex-fields{display:flex;flex-direction:column;gap:6px;align-items:flex-end}
.fl{display:flex;flex-direction:column;align-items:center;gap:2px}
.fl span{font-size:9px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.4px}
.fl input{font-size:13px;padding:5px 6px;border-radius:7px;border:1px solid var(--bd);background:var(--bg2);color:var(--text);width:80px;text-align:center}
.pbar-wrap{height:5px;background:var(--bg2);border-radius:3px;margin:10px 0 16px}
.pbar{height:100%;border-radius:3px;transition:width .3s}
.ok-msg{border-radius:12px;padding:12px;font-size:13px;font-weight:600;text-align:center;margin-top:10px}
/* MEALS */
.mc{background:var(--card,var(--bg));border:1px solid var(--bd);border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:var(--sh)}
.mc-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px}
.mc-name{display:flex;align-items:baseline;gap:6px;min-width:0;flex:1;overflow:hidden}
.mc-name b{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.mc-dot{color:var(--bd);flex-shrink:0}
.mc-time{font-size:12px;color:var(--ts);white-space:nowrap;flex-shrink:0}
.ob{display:flex;gap:4px;flex-shrink:0}
.ob button{font-size:12px;font-weight:700;padding:4px 14px;border-radius:20px;cursor:pointer;border:1px solid var(--bd);background:var(--bg2);color:var(--ts);transition:all .15s}
.ob button.on{background:var(--bBg);color:var(--b);border-color:var(--b)}
.mi{list-style:none;margin-bottom:10px}
.mi li{font-size:13px;padding:2px 0;display:flex;gap:6px;line-height:1.5;color:var(--text)}
.mi li::before{content:"·";color:var(--b);flex-shrink:0}
.mmac{display:flex;gap:12px;font-size:11px;flex-wrap:wrap;padding-top:8px;border-top:1px solid var(--bd)}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;margin-bottom:8px}
.tb-total{background:var(--bg2);border-radius:12px;padding:14px;margin-top:8px;border:1px solid var(--bd)}
.tb-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;text-align:center}
.tb-v{font-size:18px;font-weight:700;color:var(--text)}
.tb-l{font-size:10px;color:var(--ts);margin-top:1px}
/* FOOD DIARY */
.diary-toggle{width:100%;margin-top:10px;padding:8px;font-size:12px;font-weight:500;border-radius:8px;border:1px dashed var(--bd);background:transparent;cursor:pointer;color:var(--ts);text-align:center;transition:all .15s}
.diary-toggle:hover{border-color:var(--gAcc);color:var(--g)}
.diary-section{border-top:1px solid var(--bd);margin-top:10px;padding-top:10px;display:none}
.diary-section.open{display:block}
.diary-items{margin-bottom:10px}
.diary-item{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid var(--bd);font-size:12px;color:var(--ts)}
.diary-item:last-child{border-bottom:none}
.add-food-grid{display:grid;grid-template-columns:1fr 70px 70px;gap:6px;margin-bottom:8px}
.add-food-grid2{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px}
.add-food-grid input,.add-food-grid2 input{font-size:12px;padding:6px 8px;border-radius:7px;border:1px solid var(--bd);background:var(--bg2);color:var(--text);width:100%}
.add-food-grid input::placeholder,.add-food-grid2 input::placeholder{color:var(--ts)}
.diary-add-btn{width:100%;padding:7px;font-size:12px;font-weight:600;border-radius:8px;cursor:pointer;background:var(--bg2);color:var(--ts);border:1px solid var(--bd);margin-bottom:8px}
.diary-confirm-btn{width:100%;padding:9px;font-size:13px;font-weight:600;border-radius:8px;cursor:pointer;background:var(--gBg);color:var(--g);border:1px solid var(--gAcc)}
.diary-totals{background:var(--bg2);border-radius:8px;padding:8px 10px;font-size:11px;margin-bottom:8px;display:flex;gap:12px;flex-wrap:wrap}
.diary-compare{font-size:11px;color:var(--ts);margin-bottom:8px;line-height:1.6}
.food-datalist-input{font-size:13px;padding:7px 10px;border-radius:8px;border:1px solid var(--bd);background:var(--bg2);color:var(--text);width:100%}
/* REPORTS */
.sub-nav{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:3px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.sub-nav::-webkit-scrollbar{display:none}
.spill{flex-shrink:0;padding:7px 14px;font-size:12px;font-weight:500;border-radius:20px;border:1px solid var(--bd);cursor:pointer;background:var(--bg);color:var(--ts);transition:all .15s}
.spill.on{background:var(--pBg);color:var(--p);border-color:var(--p);font-weight:700}
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sum-card{border-radius:12px;padding:12px 14px}
.sum-v{font-size:22px;font-weight:800}
.sum-l{font-size:12px;font-weight:600;margin-top:2px;color:var(--text)}
.sum-s{font-size:11px;color:var(--ts);margin-top:1px}
.hm{display:flex;gap:4px}
.hm-days{display:flex;flex-direction:column;gap:3px;padding-top:22px}
.hm-days span{font-size:9px;color:var(--ts);height:18px;display:flex;align-items:center}
.hm-col{flex:1;display:flex;flex-direction:column;gap:3px}
.hm-wl{font-size:8px;color:var(--ts);text-align:center;margin-bottom:2px}
.hm-cell{height:18px;border-radius:4px}
.cal-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:5px}
.cal-hdr span{text-align:center;font-size:9px;font-weight:700;color:var(--ts);padding:3px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal-day{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text)}
.cal-day.done{background:var(--gAcc);color:#fff;font-weight:700}
.cal-day.rest{background:var(--bg2);color:var(--ts)}
.cal-day.future{color:var(--bd)}
.msel{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.msel button{padding:6px 14px;font-size:12px;font-weight:500;border-radius:20px;border:1px solid var(--bd);cursor:pointer;background:transparent;transition:all .15s}
.cmp-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--bd)}
.cmp-row:last-child{border-bottom:none}
.mb-row{margin-bottom:12px}
.mb-bar{height:9px;background:var(--bg2);border-radius:5px;margin-top:5px}
.mb-fill{height:100%;border-radius:5px}
/* CORPO */
.mg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.mf label{font-size:11px;font-weight:600;color:var(--ts);display:block;margin-bottom:4px}
.mf input{font-size:15px;padding:9px 10px;border-radius:9px;border:1px solid var(--bd);background:var(--bg2);color:var(--text);width:100%}
.sv-btn{width:100%;padding:12px;font-size:14px;font-weight:600;border-radius:10px;cursor:pointer;background:var(--gBg);color:var(--g);border:1px solid var(--gAcc)}
.hc{background:var(--bg2);border-radius:12px;padding:12px 14px;margin-bottom:10px;border:1px solid var(--bd)}
.hc-hdr{font-size:11px;font-weight:600;color:var(--ts);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.hc-vals{display:flex;flex-wrap:wrap;gap:16px}
.hc-v{font-size:16px;font-weight:700}
.hc-l{font-size:10px;color:var(--ts)}
/* TIMELINE */
.tl-item{display:flex;gap:12px;margin-bottom:4px}
.tl-dot-wrap{display:flex;flex-direction:column;align-items:center}
.tl-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tl-line{width:2px;flex:1;min-height:16px;background:var(--bd);margin:4px 0}
.tl-note{font-size:12px;color:var(--ts);background:var(--bg2);border-radius:8px;padding:7px 10px;margin-top:7px;line-height:1.5;border:1px solid var(--bd)}
.tl-content{flex:1;padding-bottom:12px}
/* MISC */
.banner{border-radius:12px;padding:14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.export-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:11px;font-size:13px;font-weight:600;border-radius:10px;cursor:pointer;border:1px solid var(--bd);background:var(--bg);color:var(--ts);width:100%;margin-bottom:10px;transition:all .15s}
.export-btn:hover{border-color:var(--gAcc);color:var(--g)}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--ts)}
.empty-state svg{width:40px;height:40px;margin-bottom:10px;stroke:currentColor;fill:none;stroke-width:1.4;opacity:.5}
.wk-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.wk-lbl{font-size:10px;color:var(--ts);text-align:center;margin-bottom:6px}
.wk-cell{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center}
.wk-cell.done{background:var(--gAcc)}
.wk-cell.empty{background:var(--bg2)}
canvas{display:block;max-width:100%}
</style>
</head>
<body>
<div id="app">
  <!-- SIDEBAR (desktop) -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h2>🏋️ FitTrack</h2>
      <p>Transformação 12 meses</p>
    </div>
    <nav class="sb-nav">
      <button class="sb-btn on" id="sb-dashboard" onclick="go('dashboard')"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>Início</button>
      <button class="sb-btn" id="sb-treino" onclick="go('treino')"><svg viewBox="0 0 24 24"><path d="M6 4v16M18 4v16M6 12h12M2 7h4M18 7h4M2 17h4M18 17h4"/></svg>Treino</button>
      <button class="sb-btn" id="sb-nutricao" onclick="go('nutricao')"><svg viewBox="0 0 24 24"><path d="M12 2C9 2 6 4.5 6 8c0 2.5 1.5 4.5 3 5.5L8 20h8l-1.5-6.5C17 12.5 18 10.5 18 8c0-3-3-6-6-6z"/></svg>Nutrição</button>
      <button class="sb-btn" id="sb-relatorios" onclick="go('relatorios')"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Relatórios</button>
      <button class="sb-btn" id="sb-corpo" onclick="go('corpo')"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Corpo</button>
      <button class="sb-btn" id="sb-timeline" onclick="go('timeline')"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1.5"/><circle cx="3" cy="12" r="1.5"/><circle cx="3" cy="18" r="1.5"/></svg>Timeline</button>
    </nav>
    <div class="sb-footer">
      <button class="theme-btn" onclick="toggleTheme()" style="width:100%"></button>
    </div>
  </aside>

  <!-- MAIN AREA -->
  <div class="main-area">
    <div class="hdr">
      <div class="hdr-left">
        <h1 id="hdr-title">Olá, Vinícius 👋</h1>
        <p id="hdr-sub">Fase 1 · Início da transformação de 12 meses</p>
      </div>
      <button class="theme-btn" onclick="toggleTheme()"></button>
    </div>

    <!-- DASHBOARD -->
    <div class="pnl on" id="pnl-dashboard">
      <div class="dash-grid">
        <div class="span2"><div class="stats" id="kpi-grid"></div></div>
        <div>
          <div class="card" id="dash-week"></div>
          <div id="dash-next"></div>
        </div>
        <div>
          <div class="card" id="dash-phase"></div>
          <div class="card">
            <span class="st">Tendência de peso</span>
            <div id="dash-weight-info" style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px"></div>
            <canvas id="chart-dash-weight" height="90"></canvas>
          </div>
        </div>
      </div>
    </div>

    <!-- TREINO -->
    <div class="pnl" id="pnl-treino">
      <div class="seg" id="phase-seg"></div>
      <div class="banner" id="phase-banner"></div>
      <div class="pills" id="day-pills"></div>
      <div class="card" id="workout-card"></div>
      <div id="workout-ok"></div>
    </div>

    <!-- NUTRIÇÃO -->
    <div class="pnl" id="pnl-nutricao">
      <span class="st">Semana</span>
      <div class="seg" id="week-seg"></div>
      <div class="pills" id="mday-pills"></div>
      <div id="meal-list"></div>
      <div class="tb-total" id="meal-total"></div>
    </div>

    <!-- RELATÓRIOS -->
    <div class="pnl" id="pnl-relatorios">
      <div class="sub-nav" id="report-subnav"></div>
      <div id="report-content"></div>
    </div>

    <!-- CORPO -->
    <div class="pnl" id="pnl-corpo">
      <div class="card">
        <span class="st">Registrar métricas hoje</span>
        <div class="mg">
          <div style="grid-column:span 2" class="mf"><label>Peso (kg)</label><input id="inp-peso" type="number" step="0.1" placeholder="78.5"></div>
          <div class="mf"><label>Cintura (cm)</label><input id="inp-cintura" type="number" placeholder="85"></div>
          <div class="mf"><label>Peito (cm)</label><input id="inp-peito" type="number" placeholder="100"></div>
          <div class="mf"><label>Braço (cm)</label><input id="inp-braco" type="number" placeholder="35"></div>
          <div class="mf"><label>Coxa (cm)</label><input id="inp-coxa" type="number" placeholder="55"></div>
        </div>
        <button class="sv-btn" onclick="saveMetric()">+ Salvar registro</button>
      </div>
      <div id="metric-history"></div>
    </div>

function toggleDiary(id){const el=document.getElementById('diary-'+id);if(el){el.classList.toggle('open');const btn=el.previousElementSibling;btn.textContent=el.classList.contains('open')?'▲ Fechar diário':'📝 Registrar o que comi';}}
function getDiaryKey(mi){return `${today()}_${S.week}_${S.mday}_${mi}`;}
function getDiaryItems(mi){const d=getDiary();return d[getDiaryKey(mi)]||[];}

function onFoodInput(mi){
  const name=document.getElementById(`fn-${mi}`).value.trim();
  const macros=FOODS_DB[name];
  if(macros){
    document.getElementById(`fk-${mi}`).placeholder=`${macros[0]} kcal/100g`;
    document.getElementById(`fp-${mi}`).placeholder=`${macros[1]}g P`;
    document.getElementById(`fc-${mi}`).placeholder=`${macros[2]}g C`;
    document.getElementById(`ff-${mi}`).placeholder=`${macros[3]}g G`;
  }
}

function addFoodEntry(mi){
  const name=document.getElementById(`fn-${mi}`).value.trim();
  const qty=parseFloat(document.getElementById(`fq-${mi}`).value)||0;
  const kcalRaw=parseFloat(document.getElementById(`fk-${mi}`).value)||0;
  const pRaw=parseFloat(document.getElementById(`fp-${mi}`).value)||0;
  const cRaw=parseFloat(document.getElementById(`fc-${mi}`).value)||0;
  const fRaw=parseFloat(document.getElementById(`ff-${mi}`).value)||0;
  if(!name||qty<=0){alert('Informe o alimento e a quantidade.');return;}
  // Check if food is in DB - use per 100g logic
  const inDB=FOODS_DB[name];
  let kcal,p,c,f;
  if(inDB&&kcalRaw===0){
    // use DB values per 100g * qty/100
    const factor=qty/100;
    kcal=Math.round(inDB[0]*factor);p=+(inDB[1]*factor).toFixed(1);c=+(inDB[2]*factor).toFixed(1);f=+(inDB[3]*factor).toFixed(1);
  } else if(kcalRaw>0&&qty>0){
    // user entered kcal/100g manually
    const factor=qty/100;
    kcal=Math.round(kcalRaw*factor);p=+(pRaw*factor).toFixed(1);c=+(cRaw*factor).toFixed(1);f=+(fRaw*factor).toFixed(1);
  } else {
    alert('Informe as calorias por 100g para calcular.');return;
  }
  const items=getDiaryItems(mi);
  items.push({name,qty,kcal,p,c,f,ts:Date.now()});
  saveDiaryItems(mi,items);
  ['fn','fq','fk','fp','fc','ff'].forEach(id=>{const el=document.getElementById(`${id}-${mi}`);if(el){el.value='';el.placeholder=el.getAttribute('data-ph')||'';}});
  renderDiarySection(mi);
}

function removeFoodEntry(mi,idx){
  const items=getDiaryItems(mi);items.splice(idx,1);saveDiaryItems(mi,items);renderDiarySection(mi);
}

function confirmMealDiary(mi){
  const items=getDiaryItems(mi);
  if(!items.length){alert('Adicione pelo menos um alimento antes de confirmar.');return;}
  const d=getDiary();
  const key=getDiaryKey(mi);
  d[key]=items.map(i=>({...i,confirmed:true}));
  saveDiary(d);
  const btn=document.getElementById(`confirm-btn-${mi}`);
  if(btn){btn.textContent='✓ Confirmado!';btn.style.background=C.gAcc;btn.style.color='#fff';btn.disabled=true;}
}

function renderDiarySection(mi){
  const items=getDiaryItems(mi);
  const el=document.getElementById(`diary-items-${mi}`);
  if(!el)return;
  if(!items.length){el.innerHTML='<div style="font-size:12px;color:var(--ts);text-align:center;padding:8px 0">Nenhum alimento registrado ainda.</div>';document.getElementById(`diary-totals-${mi}`).innerHTML='';document.getElementById(`diary-compare-${mi}`).innerHTML='';return;}
  el.innerHTML=`<div class="diary-items">${items.map((it,i)=>`<div class="diary-item"><span style="flex:1">${it.name}</span><span style="color:var(--ts)">${it.qty}g</span><span style="font-weight:600;color:var(--g);margin:0 6px">${it.kcal}kcal</span><button onclick="removeFoodEntry(${mi},${i})" style="background:none;border:none;cursor:pointer;color:var(--r);font-size:14px;padding:0 2px">×</button></div>`).join('')}</div>`;
  const tot=items.reduce((a,b)=>({kcal:a.kcal+b.kcal,p:+(a.p+b.p).toFixed(1),c:+(a.c+b.c).toFixed(1),f:+(a.f+b.f).toFixed(1)}),{kcal:0,p:0,c:0,f:0});
  document.getElementById(`diary-totals-${mi}`).innerHTML=`<span style="color:var(--g);font-weight:600">${tot.kcal} kcal</span><span style="color:${C.b};font-weight:500">${tot.p}g prot</span><span style="color:${C.a};font-weight:500">${tot.c}g carb</span><span style="color:${C.r};font-weight:500">${tot.f}g gord</span>`;
  // Compare with planned
  const key=S.week*7+S.mday;const meal=MEALS[key][mi];const mc=getCurMC();const ch=mc[mi]||'A';const planned=ch==='A'?meal.A:meal.B;
  const diffK=tot.kcal-planned.k;
  document.getElementById(`diary-compare-${mi}`).innerHTML=`<span style="font-size:11px;color:var(--ts)">Planejado: ${planned.k}kcal · Real: ${tot.kcal}kcal · <b style="color:${Math.abs(diffK)<100?C.g:C.r}">${diffK>0?'+':''}${diffK}kcal</b></span>`;
}

  <div style="display:flex;justify-content:space-between;margin-top:10px;font-size:11px"><span style="color:var(--ts)">${weekDone.filter(Boolean).length} de 6 treinos esta semana</span><span style="color:${C.g};font-weight:600">${streak} dias seguidos 🔥</span></div>`;

  document.getElementById('dash-phase').innerHTML=`<span class="st">Progresso do programa — 12 meses</span>`+
  [1,2,3,4].map(ph=>{

    ${wd.ex.map((e,i)=>{

function logWorkout(){
  const wd=PHASES[S.phase].days[S.day];const cur=getCurWD();
  const done=wd.ex.filter((_,i)=>cur.ch[i]).length;
  const log=getLog();const date=today();
  const idx=log.findIndex(e=>e.date===date&&e.phase===S.phase&&e.day===S.day);
  const entry={date,phase:S.phase,day:S.day,dayName:DN[S.day],nm:wd.nm,done,total:wd.ex.length,note:'',exercises:wd.ex.map((e,i)=>({...e,kg:cur.wt[i]||'',time:cur.tm[i]||'',checked:!!cur.ch[i]}))};
  if(idx>=0)log[idx]=entry;else log.unshift(entry);
  saveLog(log);
  document.getElementById('workout-ok').innerHTML+=`<div style="text-align:center;font-size:12px;color:${C.g};margin-top:6px;font-weight:500">✓ Registrado na timeline!</div>`;
}

        </div>
        <div class="add-food-grid2">
          <input id="fp-${key}_${mi}" type="number" placeholder="Prot/100g" data-ph="Prot/100g">
          <input id="fc-${key}_${mi}" type="number" placeholder="Carb/100g" data-ph="Carb/100g">

        <div style="font-size:11px;color:var(--ts);margin-bottom:8px">💡 Alimentos do banco de dados preenchem automaticamente. Para outros, informe kcal/100g.</div>

function onFoodInput(dkey){
  const name=document.getElementById(`fn-${dkey}`).value.trim();
  const macros=FOODS_DB[name];
  if(macros){
    const fk=document.getElementById(`fk-${dkey}`);const fp=document.getElementById(`fp-${dkey}`);const fc=document.getElementById(`fc-${dkey}`);const ff=document.getElementById(`ff-${dkey}`);
    if(fk)fk.value=macros[0];if(fp)fp.value=macros[1];if(fc)fc.value=macros[2];if(ff)ff.value=macros[3];
  }
}

function addFoodEntry(dkey){
  const name=document.getElementById(`fn-${dkey}`).value.trim();
  const qty=parseFloat(document.getElementById(`fq-${dkey}`).value)||0;
  const kcalPer=parseFloat(document.getElementById(`fk-${dkey}`).value)||0;
  const pPer=parseFloat(document.getElementById(`fp-${dkey}`).value)||0;
  const cPer=parseFloat(document.getElementById(`fc-${dkey}`).value)||0;
  const fPer=parseFloat(document.getElementById(`ff-${dkey}`).value)||0;
  if(!name||qty<=0||kcalPer<=0){alert('Informe o alimento, a quantidade (g) e as kcal/100g.');return;}
  const factor=qty/100;
  const kcal=Math.round(kcalPer*factor);const p=+(pPer*factor).toFixed(1);const c=+(cPer*factor).toFixed(1);const f=+(fPer*factor).toFixed(1);
  const d=getDiary();const items=d[`today_${dkey}`]||[];
  items.push({name,qty,kcal,p,c,f});
  d[`today_${dkey}`]=items;saveDiary(d);
  ['fn','fq','fk','fp','fc','ff'].forEach(id=>{const el=document.getElementById(`${id}-${dkey}`);if(el)el.value='';});
  renderDiarySection(dkey);
}

function removeFoodEntry(dkey,idx){const d=getDiary();const k=`today_${dkey}`;const items=d[k]||[];items.splice(idx,1);d[k]=items;saveDiary(d);renderDiarySection(dkey);}

function renderDiarySection(dkey){
  const d=getDiary();const items=d[`today_${dkey}`]||[];
  const el=document.getElementById(`diary-items-${dkey}`);if(!el)return;
  if(!items.length){el.innerHTML='<div style="font-size:12px;color:var(--ts);padding:6px 0 2px">Nenhum alimento adicionado.</div>';document.getElementById(`diary-totals-${dkey}`).innerHTML='';document.getElementById(`diary-compare-${dkey}`).innerHTML='';return;}
  el.innerHTML=`<div class="diary-items">${items.map((it,i)=>`<div class="diary-item"><span style="flex:1;color:var(--text)">${it.name}</span><span style="color:var(--ts)">${it.qty}g</span><span style="font-weight:600;color:var(--g);margin:0 8px">${it.kcal}kcal</span><button onclick="removeFoodEntry('${dkey}',${i})" style="background:none;border:none;cursor:pointer;color:var(--r);font-size:16px;padding:0">×</button></div>`).join('')}</div>`;
  const tot=items.reduce((a,b)=>({kcal:a.kcal+b.kcal,p:+(a.p+b.p).toFixed(1),c:+(a.c+b.c).toFixed(1),f:+(a.f+b.f).toFixed(1)}),{kcal:0,p:0,c:0,f:0});
  document.getElementById(`diary-totals-${dkey}`).innerHTML=`<span style="color:var(--g);font-weight:700">${tot.kcal} kcal total</span><span style="color:${C.b};font-weight:500">${tot.p}g prot</span><span style="color:${C.a};font-weight:500">${tot.c}g carb</span><span style="color:${C.r};font-weight:500">${tot.f}g gord</span>`;
  // get planned from current choice
  const parts=dkey.split('_');const mi=parseInt(parts[parts.length-1]);const wk=S.week*7+S.mday;const meal=MEALS[wk]?.[mi];
  if(meal){const mc=getCurMC();const ch=mc[mi]||'A';const plan=ch==='A'?meal.A:meal.B;const diff=tot.kcal-plan.k;document.getElementById(`diary-compare-${dkey}`).innerHTML=`<span style="font-size:11px;color:var(--ts)">Planejado: <b>${plan.k}</b> kcal · Real: <b style="color:${Math.abs(diff)<150?C.g:C.r}">${tot.kcal}</b> kcal · Diferença: <b style="color:${diff>0?C.r:C.g}">${diff>0?'+':''}${diff} kcal</b></span>`;}
}

function confirmMealDiary(dkey){
  const d=getDiary();const items=d[`today_${dkey}`]||[];
  if(!items.length){alert('Adicione pelo menos um alimento.');return;}
  d[`today_${dkey}`]=items.map(i=>({...i,confirmed:true}));saveDiary(d);
  const btn=document.getElementById(`confirm-btn-${dkey}`);
  if(btn){btn.textContent='✓ Refeição confirmada!';btn.style.background=C.gAcc;btn.style.color='#fff';btn.disabled=true;}
}

function toggleDiary(dkey){
  const el=document.getElementById(`diary-${dkey}`);if(!el)return;
  el.classList.toggle('open');
  const btn=el.previousElementSibling;
  btn.textContent=el.classList.contains('open')?'▲ Fechar diário':'📝 Registrar o que comi';
}

function renderRSemana(el){
  const log=getLog();const now=new Date();
  const hmap=[];
  for(let w=7;w>=0;w--){
    const ws=new Date(now);ws.setDate(now.getDate()-(now.getDay()+6)%7-w*7);ws.setHours(0,0,0,0);
    const days=[];
    for(let d=0;d<7;d++){const dt=new Date(ws);dt.setDate(ws.getDate()+d);const s=dt.toLocaleDateString('pt-BR').slice(0,5);days.push(log.some(e=>e.date&&e.date.startsWith(s)&&e.done>0)?1:0);}
    hmap.push({w:ws.toLocaleDateString('pt-BR').slice(0,5),d:days});
  }
  const wCounts=[];
  for(let w=5;w>=0;w--){
    const ws=new Date(now);ws.setDate(now.getDate()-(now.getDay()+6)%7-w*7);ws.setHours(0,0,0,0);
    const we=new Date(ws);we.setDate(ws.getDate()+6);we.setHours(23,59,59,999);
    const count=log.filter(e=>{const d=pDate(e.date);return d>=ws&&d<=we&&e.done>0;}).length;
    wCounts.push({sem:`S${6-w}`,treinos:count});
  }
  const total=log.length;const best=Math.max(0,...wCounts.map(w=>w.treinos));const avg=(wCounts.reduce((a,b)=>a+b.treinos,0)/Math.max(1,wCounts.length)).toFixed(1);
  el.innerHTML=`<div class="card"><span class="st">Heatmap de atividade — últimas 8 semanas</span>
  <div class="hm"><div class="hm-days">${['S','T','Q','Q','S','S','D'].map(d=>`<span>${d}</span>`).join('')}</div>
  ${hmap.map(wk=>`<div class="hm-col"><div class="hm-wl">${wk.w}</div>${wk.d.map((d,di)=>`<div class="hm-cell" style="background:${d?(di===6?'#94A3B8':C.gAcc):'var(--bg3)'}"></div>`).join('')}</div>`).join('')}</div>
  <div style="display:flex;gap:12px;margin-top:12px;font-size:10px;color:var(--ts)"><span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:${C.gAcc};display:inline-block"></span>Treino</span><span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#94A3B8;display:inline-block"></span>Descanso</span><span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:var(--bg3);display:inline-block"></span>Não realizado</span></div></div>
  <div class="card"><span class="st">Treinos por semana</span><canvas id="chart-weekly" height="130"></canvas></div>
  <div class="sum-grid">
  ${[{v:best,l:'Melhor semana',s:'treinos em um único período',bg:C.gBg,c:C.g},{v:total,l:'Total de treinos',s:'desde o início',bg:C.bBg,c:C.b},{v:avg,l:'Média semanal',s:'treinos por semana',bg:C.pBg,c:C.p},{v:total>0?Math.round(total*.75)+'h':'0h',l:'Tempo estimado',s:'média 45min/treino',bg:C.aBg,c:C.a}].map(s=>`<div class="sum-card" style="background:${s.bg}"><div class="sum-v" style="color:${s.c}">${s.v}</div><div class="sum-l">${s.l}</div><div class="sum-s">${s.s}</div></div>`).join('')}
  </div>`;
  setTimeout(()=>mkChart('chart-weekly',{type:'bar',data:{labels:wCounts.map(w=>w.sem),datasets:[{data:wCounts.map(w=>w.treinos),backgroundColor:C.gAcc+'CC',borderRadius:6,borderSkipped:false}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10}}},y:{ticks:{font:{size:10}},max:7,min:0}}}}),50);
}

function renderRMensal(el){
  const log=getLog();const now=new Date();const yr=now.getFullYear();const mo=now.getMonth();
  const dim=new Date(yr,mo+1,0).getDate();const fd=(new Date(yr,mo,1).getDay()+6)%7;
  const mNames=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const doneDays=new Set();
  log.forEach(e=>{if(e.date){const d=pDate(e.date);if(d.getMonth()===mo&&d.getFullYear()===yr)doneDays.add(d.getDate());}});
  const cnt=doneDays.size;const pct=Math.round(cnt/(dim-4)*100);
  el.innerHTML=`<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><span style="font-size:17px;font-weight:700">${mNames[mo]} ${yr}</span><span style="font-size:12px;color:${C.g};font-weight:600">${cnt} treinos · ${pct}%</span></div>
  <div class="cal-hdr">${['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map(d=>`<span>${d}</span>`).join('')}</div>
  <div class="cal-grid">${Array.from({length:fd},()=>'<div class="cal-day"></div>').join('')}${Array.from({length:dim},(_,i)=>{const day=i+1;const done=doneDays.has(day);const sun=(new Date(yr,mo,day).getDay()===0);const fut=day>now.getDate();return `<div class="cal-day ${done?'done':sun?'rest':fut?'future':''}">${day}</div>`;}).join('')}</div>
  <div style="display:flex;gap:14px;margin-top:14px;font-size:10px;color:var(--ts)"><span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:3px;background:${C.gAcc};display:inline-block"></span>Treino feito</span><span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:3px;background:var(--bg2);display:inline-block"></span>Descanso</span></div>

function renderRExportar(el){
  const log=getLog();const metrics=getMetrics();
  el.innerHTML=`<div class="card"><span class="st">Exportar dados</span><p style="font-size:13px;color:var(--ts);margin-bottom:16px;line-height:1.7">Exporte seus dados para CSV — abre em qualquer planilha (Excel, Google Sheets).</p><button class="export-btn" onclick="exportCSV('log')">📥 Exportar histórico de treinos (${log.length} registros)</button><button class="export-btn" onclick="exportCSV('metrics')">📥 Exportar métricas corporais (${metrics.length} registros)</button></div>
  <div class="card"><span class="st">Resumo geral</span>${[['📋 Treinos registrados',log.length],['📏 Métricas corporais',metrics.length+' registros'],['🏋️ Fase atual',`Fase ${S.phase} — ${PH[S.phase].nm}`],['🎯 Consistência',log.length>0?Math.round(log.filter(e=>e.done===e.total).length/log.length*100)+'%':'—']].map(([l,v])=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bd)"><span style="font-size:13px;color:var(--text)">${l}</span><span style="font-size:13px;font-weight:700;color:${C.g}">${v}</span></div>`).join('')}</div>`;
}

function exportCSV(type){
  const log=getLog();const metrics=getMetrics();
  let csv='',fn='';
  if(type==='log'){csv='Data,Fase,Dia,Treino,Feitos,Total\n';log.forEach(e=>{csv+=`${e.date},${e.phase},${e.dayName||''},${e.nm},${e.done},${e.total}\n`;});fn='treinos.csv';}
  else{csv='Data,Peso,Cintura,Peito,Braco,Coxa\n';metrics.forEach(m=>{csv+=`${m.date},${m.peso||''},${m.cintura||''},${m.peito||''},${m.braco||''},${m.coxa||''}\n`;});fn='metricas.csv';}
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=fn;a.click();
}

// RENDER CORPO
function renderCorpo(){
  const metrics=getMetrics();
  if(!metrics.length){document.getElementById('metric-history').innerHTML=`<div class="empty-state"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><div style="font-size:15px;font-weight:500;margin-bottom:4px">Nenhum registro ainda</div><div style="font-size:12px">Este é o dia zero. Registre agora para ter um ponto de partida dos seus 12 meses.</div></div>`;return;}
  const first=metrics[metrics.length-1];
  const fields=[['peso','kg',C.p],['cintura','cm',C.a],['peito','cm',C.b],['braco','cm',C.g],['coxa','cm',C.r]];
  document.getElementById('metric-history').innerHTML=`<div style="font-size:12px;font-weight:500;color:var(--ts);margin-bottom:10px">${metrics.length} registro${metrics.length>1?'s':''}</div>`+
  metrics.map((m,i)=>{
    const delta=i<metrics.length-1&&first.peso&&m.peso?((+m.peso)-(+first.peso)).toFixed(1):null;
    return `<div class="hc"><div class="hc-hdr"><span>${m.date}${i===0?` <span style="background:var(--gBg);color:${C.g};font-size:10px;padding:1px 8px;border-radius:10px;margin-left:6px;font-weight:600">atual</span>`:''}</span>${delta!==null?`<span style="font-weight:700;font-size:13px;color:${delta<0?C.g:C.r}">${delta>0?'+':''}${delta}kg vs início</span>`:'<span style="font-size:10px;color:var(--ts)">ponto de partida</span>'}</div><div class="hc-vals">${fields.filter(([k])=>m[k]).map(([k,u,c])=>`<div><div class="hc-v" style="color:${c}">${m[k]}<span style="font-size:10px;font-weight:400;margin-left:1px">${u}</span></div><div class="hc-l">${k}</div></div>`).join('')}</div></div>`;
  }).join('');
}

function saveMetric(){
  const fields=['peso','cintura','peito','braco','coxa'];
  const entry={date:today()};let ok=false;
  fields.forEach(f=>{const v=document.getElementById('inp-'+f).value;if(v){entry[f]=v;ok=true;}});
  if(!entry.peso){alert('Informe pelo menos o peso para salvar.');return;}
  const metrics=getMetrics();metrics.unshift(entry);saveMetrics(metrics);
  fields.forEach(f=>{document.getElementById('inp-'+f).value='';});
  renderCorpo();
}

// RENDER TIMELINE
function renderTimeline(){
  const log=getLog();
  const filters=[['todos','Todos'],['1','Fase 1'],['2','Fase 2'],['3','Fase 3'],['4','Fase 4']];
  document.getElementById('tl-filter').innerHTML=filters.map(([k,l])=>`<span class="pill ${S.tlf===k?'onp':''}" onclick="setTlF('${k}')">${l}</span>`).join('');
  const filtered=S.tlf==='todos'?log:log.filter(e=>e.phase===+S.tlf);
  document.getElementById('tl-count').textContent=`${filtered.length} registros`;
  if(!filtered.length){document.getElementById('tl-list').innerHTML=`<div class="empty-state"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1.5"/><circle cx="3" cy="12" r="1.5"/><circle cx="3" cy="18" r="1.5"/></svg><div style="font-size:15px;font-weight:500;margin-bottom:4px">Nenhum treino registrado</div><div style="font-size:12px">Complete um treino e clique em "Registrar na timeline"</div></div>`;return;}
  document.getElementById('tl-list').innerHTML=filtered.map((e,i)=>{
    const pc=PH[e.phase];const all=e.done===e.total;const last=i===filtered.length-1;
    return `<div class="tl-item"><div class="tl-dot-wrap"><div class="tl-dot" style="background:${all?pc.ac:'var(--bg2)'};border:2px solid ${all?pc.ac:'var(--bd)'}">${all?chkSVG():`<span style="font-size:9px;font-weight:700;color:var(--ts)">${e.done}/${e.total}</span>`}</div>${!last?'<div class="tl-line"></div>':''}</div>
    <div class="tl-content" style="${last?'padding-bottom:0':''}"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px">${e.nm}</div><div style="display:flex;gap:6px;align-items:center"><span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;background:${pc.bg};color:${pc.tx}">Fase ${e.phase}</span><span style="font-size:11px;color:var(--ts)">${e.dayName||''}</span>${all?`<span style="font-size:10px;color:${C.g};font-weight:500">✓ Completo</span>`:''}</div></div><span style="font-size:11px;color:var(--ts);flex-shrink:0;margin-left:8px">${e.date}</span></div>${e.note?`<div class="tl-note">📝 ${e.note}</div>`:''}</div></div>`;
  }).join('');
}
function setTlF(f){S.tlf=f;renderTimeline();}

// INIT
initTheme();
go('dashboard');

</script>
